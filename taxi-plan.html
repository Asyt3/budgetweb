<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Такси снежна топка · план за инвестиция</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,400i&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
<!-- Supply-chain hardening: pin this with Subresource Integrity once you have network.
     Run: curl -sL https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js | openssl dgst -sha384 -binary | openssl base64 -A
     then add integrity="sha384-<hash>" below. (Best: vendor the file into the vault for offline use.) -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js" crossorigin="anonymous"></script>
<!-- anime.js for micro-interactions (graceful: blocked = no animation). Pin with SRI / vendor on a networked machine, like Chart.js. -->
<script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js" crossorigin="anonymous"></script>
<style>
  :root {
    --paper:#f4efe6; --ink:#22281f; --green:#1f4d3a; --green-soft:#356048;
    --coral:#cf5b41; --gold:#c79a3a; --sage:#6f8f7a; --taupe:#bcae8f;
    --line:#ddd4c4; --card:#fbf8f1;
    --shadow:0 8px 30px rgba(34,40,31,.07);
  }
  * { box-sizing: border-box; }
  body {
    margin:0; color:var(--ink);
    background:radial-gradient(1100px 560px at 78% -12%, #faf7f0, var(--paper));
    background-attachment:fixed;
    font-family:'Hanken Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
    padding:18px 16px 28px;
  }
  .wrap { max-width:980px; margin:0 auto; }
  .display { font-family:'Fraunces', Georgia, serif; }

  header { margin-bottom:1rem; }
  h1 { font-family:'Fraunces', serif; color:var(--green); font-size:clamp(1.5rem,4vw,2.1rem); margin:.2rem 0 0; font-weight:600; letter-spacing:-.01em; line-height:1.05; }
  h1 em { font-style:italic; color:var(--coral); }
  .eyebrow { color:var(--green-soft); font-size:.7rem; letter-spacing:.22em; text-transform:uppercase; margin:0; }

  /* entrance + hover */
  @keyframes rise { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  .card {
    background:var(--card); border:1px solid var(--line); border-radius:15px;
    padding:1rem 1.15rem; margin-bottom:.8rem;
    transition:box-shadow .25s ease, border-color .25s ease;
    animation:rise .55s cubic-bezier(.2,.7,.2,1) both;
  }
  .card:hover { box-shadow:var(--shadow); }
  .wrap > div:nth-of-type(1){ animation-delay:.03s; }
  .wrap > div:nth-of-type(2){ animation-delay:.09s; }
  .wrap > div:nth-of-type(3){ animation-delay:.15s; }
  .wrap > div:nth-of-type(4){ animation-delay:.21s; }
  .wrap > div:nth-of-type(5){ animation-delay:.27s; }
  .wrap > div:nth-of-type(6){ animation-delay:.33s; }
  .wrap > div:nth-of-type(7){ animation-delay:.39s; }
  @media (prefers-reduced-motion: reduce){ .card { animation:none; } .bar span, .prog > i { transition:none !important; } }

  /* hero */
  .hero { background:var(--green); color:var(--paper); border:none; position:relative; overflow:hidden;
          display:grid; grid-template-columns:1fr; gap:1rem; box-shadow:0 12px 34px rgba(31,77,58,.18); }
  .hero::before { content:""; position:absolute; inset:0; pointer-events:none;
    background:radial-gradient(460px 240px at 10% -10%, rgba(255,255,255,.12), transparent 70%); }
  .hero > * { position:relative; z-index:1; }
  @media(min-width:680px){ .hero { grid-template-columns:auto 1fr; align-items:center; } }
  .hero .count { font-family:'Fraunces', serif; font-size:clamp(2.6rem,8vw,3.8rem); line-height:.9; letter-spacing:-.02em; }
  .hero .count small { font-size:1.2rem; font-style:italic; opacity:.85; }
  .hero .sub { opacity:.82; font-size:.85rem; margin:.1rem 0; }
  .badge { display:inline-block; margin-top:.55rem; font-size:.71rem; letter-spacing:.02em; padding:.3rem .85rem; border-radius:999px; background:var(--green-soft); }
  .badge.warn { background:var(--coral); }
  .chips { display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem; }
  .chip { background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.08); border-radius:13px; padding:.6rem .7rem; transition:background .2s ease; }
  .chip:hover { background:rgba(255,255,255,.15); }
  .chip .l { font-size:.63rem; letter-spacing:.03em; opacity:.78; margin:0 0 .25rem; }
  .chip .v { font-family:'Fraunces', serif; font-size:1.1rem; margin:0; }

  h2 { font-family:'Fraunces', serif; color:var(--green); font-size:1.1rem; margin:0 0 .7rem; font-weight:600; letter-spacing:-.01em; }
  h2 .h2sub { font-family:'Hanken Grotesk', sans-serif; font-weight:400; font-size:.72rem; letter-spacing:.02em; color:var(--green-soft); margin-left:.5rem; }
  .note { color:var(--green-soft); font-size:.76rem; margin:.65rem 0 0; line-height:1.45; }
  .chart-box { position:relative; height:230px; width:100%; }
  .encourage { color:var(--green); font-size:.9rem; margin:.7rem 0 0; font-weight:500; line-height:1.45; }

  /* budget = freedom (donut) */
  .budget-layout { display:grid; grid-template-columns:1fr; gap:1.1rem; align-items:center; }
  @media(min-width:640px){ .budget-layout { grid-template-columns:200px 1fr; } }
  .donut-wrap { position:relative; width:100%; max-width:200px; aspect-ratio:1; margin:0 auto; }
  .donut-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; pointer-events:none; }
  .donut-center .big { font-family:'Fraunces', serif; font-size:1.95rem; color:var(--green); line-height:1; letter-spacing:-.01em; }
  .donut-center .lbl { font-size:.6rem; letter-spacing:.06em; text-transform:uppercase; color:var(--green-soft); margin-top:.28rem; max-width:7.5rem; }
  .legend { display:flex; flex-direction:column; gap:.4rem; font-size:.82rem; color:var(--green-soft); }
  .legend i { display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:.5rem; vertical-align:middle; }
  .legend b { color:var(--ink); font-weight:600; }
  .legend .pct { opacity:.75; }
  .facts { list-style:none; padding:0; margin:.95rem 0 0; display:flex; flex-direction:column; gap:.5rem; }
  .facts li { position:relative; padding-left:1.4rem; font-size:.84rem; line-height:1.45; color:var(--ink); }
  .facts li::before { content:"✦"; position:absolute; left:0; top:.05rem; color:var(--gold); }

  /* inputs */
  .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:.7rem .8rem; }
  @media(min-width:560px){ .grid { grid-template-columns:repeat(3,1fr); } }
  @media(min-width:820px){ .grid { grid-template-columns:repeat(4,1fr); } }
  label { display:flex; flex-direction:column; gap:.3rem; }
  label .cap { font-size:.64rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em; color:var(--green-soft); }
  .field { display:flex; align-items:center; background:var(--paper); border:1px solid var(--line); border-radius:9px; padding:.45rem .65rem;
           transition:border-color .15s ease, box-shadow .15s ease, background .15s ease; }
  .field:hover { border-color:var(--green-soft); }
  .field:focus-within { border-color:var(--green); background:#fff; box-shadow:0 0 0 3px rgba(31,77,58,.12); }
  .field input { width:100%; border:none; background:transparent; outline:none; font-size:.92rem; color:var(--ink); font-family:inherit; }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance:none; margin:0; }
  input[type=number] { -moz-appearance:textfield; }
  .field .suffix { font-size:.72rem; color:var(--green-soft); margin-left:.4rem; white-space:nowrap; }
  .hint { font-size:.69rem; color:var(--green-soft); margin:.25rem 0 0; }
  .hint b { color:var(--ink); font-weight:600; }
  .reset { color:var(--coral); cursor:pointer; border:none; border-bottom:1px dashed var(--coral);
           background:none; padding:0; font:inherit; }
  .reset:hover { color:var(--green); border-color:var(--green); }
  .reset:focus-visible { outline:2px solid var(--green); outline-offset:2px; border-radius:2px; }
  .disclaimer { font-size:.7rem; color:var(--green-soft); text-align:center; margin-top:1rem; line-height:1.45; }
  /* visually hidden but available to screen readers */
  .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden;
             clip:rect(0,0,0,0); white-space:nowrap; border:0; }

  /* segmented toggle (view) */
  .seg { display:inline-flex; background:var(--paper); border:1px solid var(--line); border-radius:11px; padding:.25rem; gap:.25rem; margin-bottom:.2rem; }
  .seg button { font:inherit; font-size:.8rem; font-weight:600; color:var(--green-soft); cursor:pointer;
    border:none; background:none; padding:.4rem .85rem; border-radius:8px; transition:background .18s ease, color .18s ease; }
  .seg button:hover { color:var(--green); }
  .seg button[aria-pressed="true"] { background:var(--green); color:var(--paper); box-shadow:0 2px 8px rgba(31,77,58,.18); }
  .seg button:focus-visible { outline:2px solid var(--green); outline-offset:2px; }
  .seg-note { font-size:.74rem; color:var(--green-soft); margin:.55rem 0 .2rem; line-height:1.45; min-height:1.1em; }

  /* growth headline */
  .grow-head { display:flex; flex-wrap:wrap; align-items:baseline; gap:.1rem .8rem; margin:.2rem 0 .1rem; }
  .grow-head .big { font-family:'Fraunces', serif; font-size:clamp(2rem,6.5vw,2.9rem); color:var(--gold); line-height:1; letter-spacing:-.015em; }
  .grow-head .at { font-size:.8rem; color:var(--green-soft); }
  .grow-sub { color:var(--green-soft); font-size:.8rem; margin:.15rem 0 .2rem; }

  /* progress bar (payback) */
  .prog { height:14px; border-radius:999px; background:var(--paper); border:1px solid var(--line); overflow:hidden; margin:.2rem 0 .1rem; }
  .prog > i { display:block; height:100%; background:linear-gradient(90deg,var(--sage),var(--green-soft)); border-radius:999px;
    width:0; transition:width .5s cubic-bezier(.2,.7,.2,1); }
  .prog-row { display:flex; justify-content:space-between; font-size:.74rem; color:var(--green-soft); margin-top:.4rem; }
  .prog-row b { color:var(--ink); }
  .stab-layout { display:grid; grid-template-columns:1fr; gap:.9rem; align-items:center; }
  @media(min-width:560px){ .stab-layout { grid-template-columns:1.3fr 1fr; } }

  /* collapsible advanced assumptions */
  details.adv { margin-top:.9rem; border-top:1px dashed var(--line); padding-top:.7rem; }
  details.adv > summary { cursor:pointer; list-style:none; font-size:.7rem; font-weight:600;
    text-transform:uppercase; letter-spacing:.05em; color:var(--green-soft);
    display:inline-flex; align-items:center; gap:.4rem; padding:.25rem 0; }
  details.adv > summary::-webkit-details-marker { display:none; }
  details.adv > summary::before { content:"▸"; transition:transform .2s ease; display:inline-block; }
  details.adv[open] > summary::before { transform:rotate(90deg); }
  details.adv > summary:focus-visible { outline:2px solid var(--green); outline-offset:3px; border-radius:3px; }
  details.adv .grid { margin-top:.7rem; }

  /* scenario toggle chips (keyboard-accessible mirror of the chart legend) */
  .toggle-row { display:flex; flex-wrap:wrap; gap:.4rem; margin:.1rem 0 .6rem; }
  .toggle { font:inherit; font-size:.74rem; font-weight:600; cursor:pointer; color:var(--green-soft);
    background:var(--paper); border:1px solid var(--line); border-radius:999px; padding:.32rem .7rem;
    display:inline-flex; align-items:center; gap:.4rem; transition:background .18s ease, color .18s ease, border-color .18s ease, opacity .18s ease; }
  .toggle .dot { width:9px; height:9px; border-radius:50%; flex:none; }
  .toggle:hover { border-color:var(--green-soft); }
  .toggle[aria-pressed="false"] { opacity:.42; text-decoration:line-through; }
  .toggle:focus-visible { outline:2px solid var(--green); outline-offset:2px; }

  /* milestone readout */
  .fi-note { color:var(--green); font-size:.82rem; margin:.55rem 0 .2rem; line-height:1.45; font-weight:500; }
  .fi-note b { color:var(--gold); }
  .fi-note.out { color:var(--green-soft); font-weight:400; }

  /* graceful failure if the chart library is blocked */
  .chart-fallback { display:flex; align-items:center; justify-content:center; height:100%;
    text-align:center; color:var(--green-soft); font-size:.8rem; padding:1rem; line-height:1.5; }

  /* "how is this calculated" breakdown */
  .calc-explain { margin-top:.5rem; }
  .calc-grid { margin-top:.6rem; }
  .cb-row { display:flex; justify-content:space-between; gap:1rem; font-size:.82rem; color:var(--green-soft);
            padding:.34rem 0; border-bottom:1px dashed var(--line); }
  .cb-row b { color:var(--ink); font-weight:600; }
  .cb-row.total b { color:var(--green); }
  .cb-row.grand { border-bottom:none; font-size:.9rem; margin-top:.15rem; }
  .cb-row.grand b { color:var(--gold); font-family:'Fraunces', serif; font-size:1.15rem; }

  /* ---------- light visual refresh ---------- */
  body { padding:24px 18px 44px; }
  .wrap { max-width:1060px; }
  .card { border-radius:16px; padding:1.25rem 1.4rem; margin-bottom:1.05rem;
          box-shadow:0 1px 2px rgba(34,40,31,.04); }
  .card:hover { box-shadow:0 12px 36px rgba(34,40,31,.09); }
  h2 { font-size:1.16rem; margin-bottom:1rem; }
  .hero .count { font-size:clamp(2.9rem,8vw,4.1rem); }
  .grow-head .big { font-size:clamp(2.15rem,6.5vw,3.05rem); }
  .chart-box { height:244px; }

  .grid { grid-template-columns:repeat(auto-fit, minmax(170px, 1fr)); gap:1.05rem .9rem; }
  label { gap:.42rem; }
  label .cap { font-size:.66rem; letter-spacing:.05em; line-height:1.3; min-height:2.3em;
               display:flex; align-items:flex-end; }
  .field { padding:.6rem .7rem; border-radius:10px; min-height:46px; }
  .field input { font-size:1rem; }            /* 16px — avoids iOS zoom on focus, reads cleaner */
  .hint { font-size:.7rem; line-height:1.4; margin-top:.4rem; }

  /* grouped inputs — clear section rhythm */
  .group { margin:0; }
  .group + .group { margin-top:1.25rem; padding-top:1.15rem; border-top:1px solid var(--line); }
  .subhead { font-size:.64rem; font-weight:700; text-transform:uppercase; letter-spacing:.14em;
             color:var(--green); opacity:.78; margin:0 0 .9rem; }
  details.adv { margin-top:1.25rem; }

  .preview-flag { position:fixed; right:12px; bottom:12px; z-index:50; font-size:.66rem; font-weight:600;
                  letter-spacing:.04em; color:var(--paper); background:var(--green-soft); opacity:.92;
                  padding:.35rem .7rem; border-radius:999px; box-shadow:0 6px 18px rgba(53,96,72,.3); }

  /* ---------- two-column workspace layout ---------- */
  body.v-columns { padding:22px 12px 40px; }
  .v-columns .wrap { max-width:none; }
  .app { display:grid; grid-template-columns:1fr; gap:1rem; }
  @media (min-width:920px){
    .app { grid-template-columns:380px 1fr; align-items:start; }
    .inputs-col { position:sticky; top:14px; max-height:calc(100vh - 28px); overflow:auto;
                  -webkit-overflow-scrolling:touch; }
    .inputs-col .card { margin-bottom:0; }
  }
  .v-columns .inputs-col .grid { grid-template-columns:1fr; gap:.95rem; }
  .v-columns .inputs-col label .cap { min-height:0; }
  .results-col > .card:first-child { margin-top:0; }

  /* ---------- password gate ---------- */
  .gate { min-height:72vh; display:flex; align-items:center; justify-content:center; padding:2rem 1rem; }
  .gate-card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:1.7rem 1.5rem;
               max-width:340px; width:100%; box-shadow:0 12px 36px rgba(34,40,31,.09); }
  .gate .eyebrow { margin-bottom:.2rem; }
  .gate-h { font-family:'Fraunces', serif; color:var(--green); font-size:1.5rem; margin:.1rem 0 1.1rem; font-weight:600; letter-spacing:-.01em; }
  .gate-lbl { display:block; font-size:.66rem; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--green-soft); margin-bottom:.45rem; }
  .gate-input { width:100%; font:inherit; font-size:1rem; padding:.7rem .8rem; border:1px solid var(--line);
                border-radius:10px; background:var(--paper); color:var(--ink); }
  .gate-input:focus-visible { outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(31,77,58,.12); }
  .gate-btn { margin-top:1.1rem; width:100%; font:inherit; font-weight:600; font-size:.95rem; color:var(--paper);
              background:var(--green); border:none; border-radius:10px; padding:.78rem; cursor:pointer; transition:background .18s ease; }
  .gate-btn:hover { background:var(--green-soft); }
  .gate-btn:focus-visible { outline:2px solid var(--green); outline-offset:2px; }
  .gate-err { color:var(--coral); font-size:.8rem; margin:.75rem 0 0; min-height:1.1em; line-height:1.4; }
  .gate-note { color:var(--green-soft); font-size:.72rem; margin:.9rem 0 0; line-height:1.45; }
</style>
</head>
<body class="v-columns">
<div id="gate" class="gate">
  <form id="gateForm" class="gate-card" autocomplete="on">
    <p class="eyebrow">Защитен достъп</p>
    <h1 class="gate-h">Такси план</h1>
    <label class="gate-lbl" for="gatePass">Парола</label>
    <input id="gatePass" name="password" type="password" class="gate-input" autocomplete="current-password" autofocus />
    <button type="submit" class="gate-btn">Отключи</button>
    <p id="gateErr" class="gate-err" role="alert" aria-live="assertive"></p>
    <p class="gate-note">Съдържанието е криптирано (AES-GCM). Паролата не се пази никъде — отваря страницата само в твоя браузър.</p>
  </form>
</div>

const b64d = s => Uint8Array.from(atob(s), ch => ch.charCodeAt(0));
async function deriveKey(pw, salt){
  const base = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey({ name:'PBKDF2', salt, iterations:PAYLOAD.iters, hash:'SHA-256' },
                                 base, { name:'AES-GCM', length:256 }, false, ['decrypt']);
}
async function unlock(pw){
  const key = await deriveKey(pw, b64d(PAYLOAD.salt));
  const buf = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64d(PAYLOAD.iv) }, key, b64d(PAYLOAD.ct));
  return new TextDecoder().decode(buf);
}
// inject the decrypted markup, re-creating <script> nodes so they execute
function activate(html){
  const root = document.getElementById('appRoot');
  const tpl = document.createElement('template'); tpl.innerHTML = html;
  Array.from(tpl.content.childNodes).forEach(node => {
    if (node.nodeName === 'SCRIPT'){
      const s = document.createElement('script');
      s.textContent = node.textContent;
      root.appendChild(s);
    } else {
      root.appendChild(node);
    }
  });
  const gate = document.getElementById('gate'); if (gate) gate.remove();
}
document.getElementById('gateForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('gateErr');
  const field = document.getElementById('gatePass');
  err.textContent = '';
  if (!(window.crypto && crypto.subtle)){
    err.textContent = 'Браузърът не поддържа защитата — отвори страницата по HTTPS.';
    return;
  }
  try {
    const markup = await unlock(field.value);
    activate(markup);
  } catch (ex){
    err.textContent = 'Грешна парола. Опитай пак.';
    field.value = ''; field.focus();
  }
});
</script>
